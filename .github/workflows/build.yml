name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: PDF-Master-mac
            files: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            platform: win
            artifact: PDF-Master-win
            files: |
              release/*.exe
          - os: ubuntu-latest
            platform: linux
            artifact: PDF-Master-linux
            files: |
              release/*.deb
              release/*.AppImage

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 设置 Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Linux 打包依赖 + 升级 GCC 到 13（muhammara 6.x 需要 C++20）
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libgtk-3-0 \
            build-essential python3 make g++-13 gcc-13 \
            || sudo apt-get install -y libasound2 || true
          # 让 muhammara native 编译用 gcc-13（需要 C++20）
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      - name: 安装依赖
        env:
          npm_config_runtime_version: 31
          npm_config_build_from_source: true
        run: npm ci --foreground-scripts

      - name: 诊断 muhammara binding
        shell: bash
        run: |
          echo "=== muhammara binding 文件 ==="
          ls -la node_modules/muhammara/binding/ 2>/dev/null || echo "(no binding dir)"
          echo ""
          echo "=== electron 版本 ==="
          npx electron --version || true
          echo ""
          echo "=== 简单加载测试（用 electron） ==="
          npx electron --no-sandbox --version || true

      - name: 构建前端 + 打包 Electron 应用
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build:${{ matrix.platform }} -- --publish never

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 展平文件结构
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: 删除已存在的同名 Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              })
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              })
              console.log(`Deleted existing release ${release.data.id}`)
            } catch (e) {
              if (e.status === 404) {
                console.log('No existing release found, creating new one')
              } else {
                throw e
              }
            }

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

